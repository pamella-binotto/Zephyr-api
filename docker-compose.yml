version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: zephyr-postgres
    restart: always
    environment:
      POSTGRES_DB: zephyr_db
      POSTGRES_USER: zephyr
      POSTGRES_PASSWORD: zephyr123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: